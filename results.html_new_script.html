
    <!-- Logic -->
    <script src="js/products_data.js"></script>
    <script src="js/modal_system.js"></script>
    <script>
        async function initSearchResults() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q') || '';
            const input = document.getElementById('header-search');
            if (input) input.value = query;
            
            document.getElementById('hero-query').textContent = query ? query.toUpperCase() : 'RESULTS';
            const searchTerm = query.toLowerCase().trim();
            const searchKeywords = searchTerm.split(/\s+/).filter(k => k.length > 0);

            // ─── DATABASE FETCH (MySQL Backend) ──────────────────────────
            let dbProducts = [];
            try {
                const res = await fetch(`http://localhost:5001/api/products?search=${encodeURIComponent(searchTerm)}&limit=100`);
                if (res.ok) {
                    const data = await res.json();
                    const rawProducts = data.data || [];
                    dbProducts = rawProducts.map(p => {
                        const dbId = 'db-' + p.id;
                        const normalized = {
                            id: dbId,
                            title: p.name || p.title,
                            category: p.category_name || p.category || 'General',
                            img: (p.image_path && p.image_path.trim() !== '') ? (p.image_path.startsWith('assets/uploads/') ? 'admin/dist/' + p.image_path : p.image_path) : 'images/default_product.png',
                            price: p.price ? '₹' + Math.round(p.price).toLocaleString('en-IN') : 'Inquire',
                            description: p.description || 'Premium quality export product.',
                            company: { 
                                name: p.brand_name || 'IndiaTrade',
                                initials: (p.brand_name || 'IT').substring(0, 2).toUpperCase(),
                                phone: p.brand_phone || '+91 91372 07026',
                                email: p.brand_email || 'vibrantindiatech515@gmail.com',
                                address: p.brand_address || 'New Delhi, India',
                                about: p.brand_about || 'Trusted supplier of premium quality products.'
                            }
                        };
                        // Inject into global state for modal access
                        if (!window.GLOBAL_PRODUCTS) window.GLOBAL_PRODUCTS = {};
                        window.GLOBAL_PRODUCTS[dbId] = normalized;
                        return normalized;
                    });
                }
            } catch (err) {
                console.warn("Database search unavailable:", err);
            }

            // Sync Tab Click Handlers
            document.getElementById('tab-products')?.addEventListener('click', function() {
                document.querySelectorAll('.side-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                renderFilteredResults();
            });
            document.getElementById('tab-business')?.addEventListener('click', function() {
                document.querySelectorAll('.side-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const grid = document.getElementById('results-grid');
                grid.innerHTML = '<div style="text-align:center;padding:100px;grid-column:1/-1;width:100%;"><i class="fa-solid fa-building-circle-check" style="font-size:4rem;color:#f26b43;margin-bottom:20px;display:block;"></i><h3 style="font-family:Poppins;font-weight:800;font-size:1.5rem;color:#0A2540;">BUSINESS DIRECTORY</h3><p style="color:#64748b;font-weight:500;">We are currently verifying the manufacturers for this search query.</p></div>';
            });
            
            // Build base matched products
            let baseMatchedProducts = dbProducts;
            const seenTitles = new Set(dbProducts.map(p => p.title.toLowerCase()));
            
            // Local fallback ONLY if DB returned nothing
            if (baseMatchedProducts.length === 0) {
                const sourceData = (typeof GLOBAL_PRODUCTS !== 'undefined') ? GLOBAL_PRODUCTS : (typeof ALL_PRODUCTS !== 'undefined' ? ALL_PRODUCTS : PRODUCTS);
                Object.keys(sourceData).forEach(id => {
                    const p = sourceData[id];
                    const title = p.title || '';
                    if (seenTitles.has(title.toLowerCase())) return;

                    const searchableText = `${title} ${p.description || p.desc || ''} ${p.category || ''}`.toLowerCase();
                    let score = 0;
                    if (searchTerm.length === 0) score = 1;
                    else {
                        searchKeywords.forEach(k => { if (searchableText.includes(k)) score++; });
                        if (searchableText.includes(searchTerm)) score += 5;
                    }
                    if (searchTerm.length > 0 && score >= 5) {
                        baseMatchedProducts.push({...p, id, score});
                        seenTitles.add(title.toLowerCase());
                    } else if (searchTerm.length === 0) {
                        baseMatchedProducts.push({...p, id, score: 1});
                    }
                });
            }

            window.baseMatchedProducts = baseMatchedProducts;
            
            // Build filter listeners
            const brandFiltersContainer = document.getElementById('brand-filters');
            if (brandFiltersContainer) {
                const uniqueBrands = [...new Set(baseMatchedProducts.map(p => p.company.name))].sort();
                brandFiltersContainer.innerHTML = uniqueBrands.map(b => 
                    `<label class="filter-item"><input type="checkbox" value="${b}"> <span>${b}</span></label>`
                ).join('');
            }
            
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', renderFilteredResults);
            });

            renderFilteredResults();
        }

        function renderFilteredResults() {
            const grid = document.getElementById('results-grid');
            const searchTerm = (document.getElementById('header-search')?.value || '').toLowerCase().trim();
            
            // Simple logic: filter the baseMatchedProducts by checked categories/brands
            const checkedCats = Array.from(document.querySelectorAll('#category-filters input:checked')).map(cb => cb.value.toLowerCase());
            const checkedBrands = Array.from(document.querySelectorAll('#brand-filters input:checked')).map(cb => cb.value.toLowerCase());

            let filtered = window.baseMatchedProducts || [];

            if (checkedCats.length > 0) {
                filtered = filtered.filter(p => checkedCats.some(c => p.category.toLowerCase().includes(c)));
            }
            if (checkedBrands.length > 0) {
                filtered = filtered.filter(p => checkedBrands.some(b => p.company.name.toLowerCase() === b));
            }

            grid.innerHTML = '';
            document.getElementById('total-found').textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;"><h3>No matching products found</h3><p>Try clearing filters or searching for something else.</p></div>';
                return;
            }

            filtered.forEach((p, index) => {
                grid.innerHTML += `
                    <div class="ts-card" data-aos="fade-up" data-aos-delay="${index * 50}" style="border-radius:18px; overflow:hidden; background:#fff; border:1px solid #edf2f7; box-shadow:0 4px 24px rgba(0,0,0,0.06); display:flex; flex-direction:column; transition:all 0.3s ease; height:100%;" onmouseover="this.style.transform='translateY(-8px)';this.style.boxShadow='0 12px 32px rgba(0,0,0,0.1)';" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 24px rgba(0,0,0,0.06)';" onclick="openModal('${p.id}')">
                        <div style="height:220px; background:#fff; display:flex; align-items:center; justify-content:center; padding:20px; position:relative;">
                            <img src="${p.img}" alt="${p.title}" style="max-width:100%; max-height:100%; object-fit:contain; transition:transform 0.5s ease;" onmouseover="this.style.transform='scale(1.08)';" onmouseout="this.style.transform='scale(1)';">
                            <div style="position:absolute; top:12px; left:12px; background:#fff1ec; color:#f26b43; padding:4px 12px; border-radius:100px; font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:0.5px;">${p.category}</div>
                        </div>
                        <div style="padding:20px; display:flex; flex-direction:column; flex-grow:1; border-top:1px solid #f8fafc;">
                            <h3 style="font-family:'Poppins'; font-size:1.05rem; font-weight:800; color:#0A2540; margin:0 0 10px; line-height:1.4;">${p.title}</h3>
                            <p style="font-size:0.85rem; color:#64748b; line-height:1.6; margin:0 0 15px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${p.description}</p>
                            <div style="margin-top:auto; display:flex; justify-content:space-between; align-items:center; padding-top:15px; border-top:1px dashed #e2e8f0;">
                                <div style="display:flex; flex-direction:column;">
                                    <span style="font-size:0.7rem; color:#94a3b8; font-weight:700; text-transform:uppercase;">Price Approx</span>
                                    <span style="font-size:1.1rem; font-weight:800; color:#0A2540;">${p.price}</span>
                                </div>
                                <button style="background:#0A2540; color:#fff; border:none; padding:8px 16px; border-radius:8px; font-weight:700; font-size:0.8rem; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.background='#2563eb';" onmouseout="this.style.background='#0A2540';">Details</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = initSearchResults;
    </script>
</body>
</html>
